<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prix Carburants - Métropole Lyon</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom right, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COMMUNES_METROPOLE = [
          'LYON', 'VILLEURBANNE', 'VENISSIEUX', 'CALUIRE-ET-CUIRE', 'SAINT-PRIEST',
          'BRON', 'RILLIEUX-LA-PAPE', 'MEYZIEU', 'DECINES-CHARPIEU', 'OULLINS',
          'SAINTE-FOY-LES-LYON', 'VAULX-EN-VELIN', 'TASSIN-LA-DEMI-LUNE',
          'ECULLY', 'FRANCHEVILLE', 'PIERRE-BENITE', 'SAINT-GENIS-LAVAL',
          'CORBAS', 'GENAY', 'NEUVILLE-SUR-SAONE', 'DARDILLY', 'CHARBONNIERES-LES-BAINS',
          'CHAMPAGNE-AU-MONT-D\'OR', 'COLLONGES-AU-MONT-D\'OR', 'COUZON-AU-MONT-D\'OR',
          'FONTAINES-SUR-SAONE', 'LIMONEST', 'POLEYMIEUX-AU-MONT-D\'OR', 'SAINT-CYR-AU-MONT-D\'OR',
          'SAINT-DIDIER-AU-MONT-D\'OR', 'SAINT-GENIS-LES-OLLIERES', 'CRAPONNE',
          'MARCY-L\'ETOILE', 'LA-MULATIERE', 'ROCHETAILLEE-SUR-SAONE', 'FONTAINES-SAINT-MARTIN',
          'SAINT-FONS', 'FEYZIN', 'IRIGNY', 'MIONS', 'SATHONAY-CAMP', 'SATHONAY-VILLAGE',
          'VERNAISON', 'BRINDAS', 'CHAPONOST', 'LISSIEU', 'CAILLOUX-SUR-FONTAINES',
          'FLEURIEU-SUR-SAONE', 'JONAGE', 'JONS', 'PUSIGNAN', 'SAINT-BONNET-DE-MURE',
          'COLOMBIER-SAUGNIEU', 'GENAS', 'TOUSSIEU', 'SAINT-LAURENT-DE-MURE',
          'QUINCIEUX', 'MONTANAY', 'CURIS-AU-MONT-D\'OR'
        ];

        const CARBURANTS = [
          { id: 'Gazole', label: 'Gazole', color1: '#3b82f6', color2: '#06b6d4', icon: '🚗' },
          { id: 'SP98', label: 'SP98', color1: '#a855f7', color2: '#ec4899', icon: '🏎️' },
          { id: 'SP95', label: 'SP95', color1: '#10b981', color2: '#059669', icon: '⛽' }
        ];

        function App() {
          const [data, setData] = useState({});
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [lastUpdate, setLastUpdate] = useState(null);

          useEffect(() => {
            chargerDonnees();
          }, []);

          const chargerDonnees = async () => {
            setLoading(true);
            setError(null);

            try {
              const dataUrl = 'https://donnees.roulez-eco.fr/opendata/instantane';
              const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(dataUrl)}`;
              
              const response = await fetch(proxyUrl);
              if (!response.ok) throw new Error('Erreur de chargement');

              const xmlText = await response.text();
              const parser = new DOMParser();
              const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

              const stations = extraireStations(xmlDoc);
              setData(stations);
              setLastUpdate(new Date());
            } catch (err) {
              setError('Impossible de charger les données');
              console.error(err);
            } finally {
              setLoading(false);
            }
          };

          const extraireStations = (xmlDoc) => {
            const resultats = {};
            CARBURANTS.forEach(c => { resultats[c.id] = []; });

            const pdvs = xmlDoc.getElementsByTagName('pdv');

            for (let pdv of pdvs) {
              const cp = pdv.getAttribute('cp') || '';
              if (!cp.startsWith('69')) continue;

              const adresseElem = pdv.getElementsByTagName('adresse')[0];
              if (!adresseElem) continue;

              const adresse = adresseElem.textContent.trim();
              const ville = adresse.toUpperCase();

              const isMetropole = COMMUNES_METROPOLE.some(c => ville.includes(c));
              if (!isMetropole) continue;

              const prix = pdv.getElementsByTagName('prix');

              for (let p of prix) {
                const nom = p.getAttribute('nom');
                const valeur = p.getAttribute('valeur');
                const maj = p.getAttribute('maj');

                if (valeur && resultats[nom]) {
                  resultats[nom].push({
                    ville: ville,
                    adresse: adresse,
                    prix: parseFloat(valeur) / 1000,
                    maj: maj
                  });
                }
              }
            }

            Object.keys(resultats).forEach(carburant => {
              resultats[carburant].sort((a, b) => a.prix - b.prix);
              resultats[carburant] = resultats[carburant].slice(0, 3);
            });

            return resultats;
          };

          if (loading) {
            return (
              <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}>
                <div style={{ background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(20px)', borderRadius: '1.5rem', padding: '3rem', textAlign: 'center', border: '1px solid rgba(255,255,255,0.2)' }}>
                  <div className="spin" style={{ width: '4rem', height: '4rem', border: '4px solid rgba(255,255,255,0.1)', borderTop: '4px solid #60a5fa', borderRadius: '50%', margin: '0 auto 1rem' }}></div>
                  <p style={{ color: 'white', fontSize: '1.25rem' }}>Chargement des prix...</p>
                </div>
              </div>
            );
          }

          if (error) {
            return (
              <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}>
                <div style={{ background: 'rgba(239,68,68,0.2)', backdropFilter: 'blur(20px)', borderRadius: '1.5rem', padding: '2rem', textAlign: 'center', border: '1px solid rgba(239,68,68,0.3)', maxWidth: '28rem' }}>
                  <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>⚠️</div>
                  <p style={{ color: '#fca5a5', marginBottom: '1rem' }}>{error}</p>
                  <button onClick={chargerDonnees} style={{ padding: '0.75rem 1.5rem', background: '#ef4444', color: 'white', borderRadius: '0.75rem', fontWeight: '600', border: 'none', cursor: 'pointer' }}>
                    Réessayer
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div style={{ minHeight: '100vh', padding: '1rem' }}>
              <div style={{ maxWidth: '72rem', margin: '0 auto 2rem' }}>
                <div style={{ background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(20px)', borderRadius: '1.5rem', padding: '2rem', border: '1px solid rgba(255,255,255,0.2)', boxShadow: '0 25px 50px -12px rgba(0,0,0,0.5)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '1rem' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                      <div style={{ width: '3.5rem', height: '3.5rem', background: 'linear-gradient(to bottom right, #3b82f6, #a855f7)', borderRadius: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.3)', fontSize: '2rem' }}>
                        ⛽
                      </div>
                      <div>
                        <h1 style={{ fontSize: '2rem', fontWeight: '900', color: 'white', margin: 0 }}>Top 3 Stations</h1>
                        <p style={{ color: '#93c5fd', fontSize: '0.875rem', margin: 0 }}>Métropole de Lyon • Données officielles</p>
                      </div>
                    </div>
                    {lastUpdate && (
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'rgba(255,255,255,0.7)', fontSize: '0.875rem' }}>
                        🕐 {lastUpdate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div style={{ maxWidth: '72rem', margin: '0 auto' }}>
                {CARBURANTS.map((carburant) => {
                  const stations = data[carburant.id] || [];

                  return (
                    <div key={carburant.id} style={{ background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(20px)', borderRadius: '1.5rem', padding: '2rem', border: '1px solid rgba(255,255,255,0.2)', boxShadow: '0 25px 50px -12px rgba(0,0,0,0.5)', marginBottom: '1.5rem' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1.5rem', paddingBottom: '1rem', borderBottom: '1px solid rgba(255,255,255,0.2)' }}>
                        <div style={{ fontSize: '2.5rem', background: `linear-gradient(to bottom right, ${carburant.color1}, ${carburant.color2})`, width: '4rem', height: '4rem', borderRadius: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.3)' }}>
                          {carburant.icon}
                        </div>
                        <div>
                          <h2 style={{ fontSize: '1.875rem', fontWeight: '700', color: 'white', margin: 0 }}>{carburant.label}</h2>
                          <p style={{ color: 'rgba(255,255,255,0.6)', margin: 0 }}>{stations.length} station{stations.length > 1 ? 's' : ''} trouvée{stations.length > 1 ? 's' : ''}</p>
                        </div>
                      </div>

                      {stations.length === 0 ? (
                        <p style={{ color: 'rgba(255,255,255,0.5)', textAlign: 'center', padding: '2rem 0' }}>Aucune station disponible</p>
                      ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                          {stations.map((station, index) => {
                            const medals = ['🥇', '🥈', '🥉'];
                            const priceDate = new Date(station.maj);

                            return (
                              <div key={index} style={{ background: 'rgba(255,255,255,0.05)', borderRadius: '1rem', padding: '1.25rem', border: '1px solid rgba(255,255,255,0.1)' }}>
                                <div style={{ display: 'flex', alignItems: 'start', gap: '1rem' }}>
                                  <div style={{ fontSize: '2.5rem', flexShrink: 0 }}>{medals[index]}</div>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: '700', color: 'white', margin: '0 0 0.25rem 0' }}>{station.ville}</h3>
                                    <div style={{ display: 'flex', alignItems: 'start', gap: '0.5rem', color: 'rgba(255,255,255,0.6)', fontSize: '0.875rem', marginBottom: '0.75rem' }}>
                                      <span style={{ flexShrink: 0 }}>📍</span>
                                      <span style={{ wordBreak: 'break-word' }}>{station.adresse}</span>
                                    </div>
                                    <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.5)' }}>MAJ: {priceDate.toLocaleDateString('fr-FR')}</div>
                                  </div>
                                  <div style={{ flexShrink: 0, textAlign: 'right' }}>
                                    <div style={{ fontSize: '2rem', fontWeight: '900', background: `linear-gradient(to right, ${carburant.color1}, ${carburant.color2})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
                                      {station.prix.toFixed(3)}
                                    </div>
                                    <div style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.875rem', fontWeight: '600' }}>€ / L</div>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div style={{ maxWidth: '72rem', margin: '2rem auto 0' }}>
                <div style={{ background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(20px)', borderRadius: '1rem', padding: '1.5rem', border: '1px solid rgba(255,255,255,0.1)', textAlign: 'center' }}>
                  <button onClick={chargerDonnees} style={{ padding: '0.75rem 2rem', background: 'linear-gradient(to right, #3b82f6, #a855f7)', color: 'white', fontWeight: '700', borderRadius: '0.75rem', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.3)', border: 'none', cursor: 'pointer', fontSize: '1rem' }}>
                    🔄 Actualiser
                  </button>
                  <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.75rem', marginTop: '1rem', marginBottom: 0 }}>Source : Ministère de la Transition Écologique</p>
                </div>
              </div>
            </div>
          );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
